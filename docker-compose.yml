version: "3.9"

# All external services (LLM, vector store, postgres, redis) are cloud-hosted for $0.
# This compose file runs the backend + frontend locally against those cloud services.
# Copy .env.example to .env and fill in your API keys before running.

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
